<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Camera icon background -->
  <rect width="128" height="128" fill="#4CAF50" rx="16"/>
  
  <!-- Camera body -->
  <rect x="24" y="40" width="80" height="60" fill="white" rx="4"/>
  
  <!-- Camera lens -->
  <circle cx="64" cy="68" r="20" fill="none" stroke="#4CAF50" stroke-width="3"/>
  <circle cx="64" cy="68" r="12" fill="#4CAF50" opacity="0.3"/>
  
  <!-- Flash -->
  <rect x="32" y="20" width="12" height="12" fill="#FFD700" rx="2"/>
  
  <!-- Viewfinder -->
  <rect x="35" y="16" width="58" height="8" fill="none" stroke="#666" stroke-width="1" opacity="0.3"/>
</svg>