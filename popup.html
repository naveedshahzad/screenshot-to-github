<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Screenshot Uploader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .content {
      padding: 16px;
    }

    .status-section {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .status-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-value {
      font-size: 14px;
      color: #333;
      word-break: break-all;
    }

    .enabled-badge {
      display: inline-block;
      background: #28a745;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 6px;
    }

    .disabled-badge {
      display: inline-block;
      background: #999;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 6px;
    }

    .domain-count {
      font-size: 20px;
      color: #667eea;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
      text-align: center;
    }

    .btn-settings {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-settings:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-open-catbox {
      background: #e9ecef;
      color: #333;
      text-decoration: none;
    }

    .btn-open-catbox:hover {
      background: #dee2e6;
    }

    .domain-list {
      max-height: 200px;
      overflow-y: auto;
      font-size: 12px;
      color: #666;
    }

    .domain-item {
      padding: 6px;
      margin-bottom: 4px;
      background: #f0f0f0;
      border-radius: 4px;
      word-break: break-word;
    }

    .info-box {
      background: #d1ecf1;
      border: 1px solid #bee5eb;
      color: #0c5460;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📸 Screenshot Uploader</h1>
    <p>Full-page screenshots to catbox</p>
  </div>

  <div class="content">
    <div class="info-box">
      ℹ️ This extension captures and uploads screenshots to catbox.moe for 24 hours.
    </div>

    <div class="status-section">
      <div class="status-label">Enabled Domains</div>
      <div class="domain-count" id="domainCount">-</div>
      <div id="domainsList" class="domain-list"></div>
    </div>

    <div class="status-section">
      <div class="status-label">Current Domain</div>
      <div class="status-value" id="currentDomain">-</div>
      <div id="currentStatus" style="margin-top: 8px;"></div>
    </div>

    <div class="actions">
      <button id="settingsBtn" class="btn btn-settings">⚙️ Settings</button>
      <a href="https://catbox.moe" target="_blank" class="btn btn-open-catbox">🔗 Catbox</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
